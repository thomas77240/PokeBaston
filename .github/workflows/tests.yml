name : Java CI Pokebaston
on:
  push:
    branches: [ main, test-back ] 
      pull_request:
        branches: [ main ]

    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21' 
            distribution: 'temurin'
            cache: maven
        - name: Build and Test
          run: mvn test